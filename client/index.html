<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ControlPlus — Business Software & Hardware Solutions | India</title>
    <meta name="description" content="ControlPlus provides GST-compliant billing, inventory, POS, CRM software and quality hardware solutions for Indian businesses. Free installation, training & support." />
    <meta name="keywords" content="billing software, inventory management, POS system, GST software, CRM, business software, hardware solutions, refurbished laptops, India, ControlPlus" />
    <meta name="author" content="ControlPlus" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0B1F3A" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://controlplus.in/" />

    <!-- OpenGraph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://controlplus.in/" />
    <meta property="og:title" content="ControlPlus — Business Software & Hardware Solutions" />
    <meta property="og:description" content="Complete GST-compliant billing, inventory, POS, CRM software and quality hardware for Indian businesses. Free installation & support." />
    <meta property="og:image" content="https://controlplus.in/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ControlPlus" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ControlPlus — Business Software & Hardware Solutions" />
    <meta name="twitter:description" content="Complete GST-compliant billing, inventory, POS, CRM software and quality hardware for Indian businesses." />
    <meta name="twitter:image" content="https://controlplus.in/og-image.svg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ControlPlus",
      "url": "https://controlplus.in",
      "logo": "https://controlplus.in/favicon.svg",
      "description": "Business software and hardware solutions for Indian businesses. GST-compliant billing, inventory, POS, CRM, and quality refurbished hardware.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [],
      "areaServed": "IN",
      "foundingLocation": "India"
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ControlPlus",
      "url": "https://controlplus.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://controlplus.in/products?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
