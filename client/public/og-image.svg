<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#132B4F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- C+ Logo -->
  <g transform="translate(460, 100)" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 200 100 A 72 72 0 1 0 200 206"/>
    <line x1="200" y1="78" x2="200" y2="140"/>
    <line x1="170" y1="109" x2="230" y2="109"/>
  </g>

  <!-- ControlPlus text -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#FFFFFF">Control<tspan fill="#E8913A">Plus</tspan></text>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#8899B0">Business Software &amp; Hardware Solutions</text>

  <!-- Subtle bottom accent line -->
  <rect x="500" y="530" width="200" height="3" rx="1.5" fill="#E8913A" opacity="0.6"/>
</svg>
